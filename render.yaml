services:
  - type: web
    name: brewhouse-server
    env: node
    region: ohio
    plan: free
    buildCommand: "npm install && npm run db:generate"
    startCommand: "npm run start"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set this to your Vercel deployment URL, e.g. https://cafeqr-zeta.vercel.app
      - key: FRONTEND_URL
        sync: false
    rootDir: server
